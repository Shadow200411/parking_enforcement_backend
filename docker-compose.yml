version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: parking_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: parking_web
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/parking_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/code
    command: sh -c "cd app && alembic upgrade head && cd .. && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data: